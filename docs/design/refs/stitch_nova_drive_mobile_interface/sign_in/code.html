<style>

        background-color: #0c1321;
        overflow-x: hidden;

        background: rgba(21, 29, 46, 0.8);
        backdrop-filter: blur(12px);

        background: linear-gradient(90deg, transparent 0%, #1c2636 50%, transparent 100%);

        width: 100%;
      }

        top: 0;
        left: 0;
        width: 100%;

<body class="font-body-md text-on-surface">
<div class="bg-blur-effect"></div>
<div class="min-h-screen flex flex-col justify-center items-center px-margin-mobile py-12 md:px-margin-desktop">
<!-- Logo Section -->
<header class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-top duration-700">
<div class="w-20 h-20 mb-4 flex items-center justify-center relative">
<!-- Decorative Glow for Logo -->
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full scale-110"></div>
<img alt="NovaDrive Hex Logo" class="w-full h-full relative z-10" data-alt="A stylized geometric hexagon logo for a technology brand named NovaDrive. The logo features sharp, futuristic lines with a gradient of cyan and amber, set against a deep navy background. The overall aesthetic is professional, high-tech, and evocative of a modern vehicle dashboard or heads-up display." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCKesa60_mPINkuv-lS3rM5wpxSV5PmJmCG2pCYBWA99TlrXlfAjh0u2OS32CzdfzZPtIRnx_24bl6olBGzyjGjKdaW0bw0i_ncOIsEeDK1CDx78C8rqbG11mOy8x412ULk57HvoFSxzM47N58PRP1JEhTGV6CWPXXMBdS0QlbGejjT6qfDJ2Z8hajaqGc2z5O-LKkvkDPEaxMFjInvlwZFe2fBPKiI6VO8KmJy9l74Vs0XgUzq1VTwKj77_suHbjXa8LLbSSiFJI">
</div>
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">NovaDrive</h1>
</header>
<!-- Main Container -->
<main class="w-full max-w-md animate-in fade-in slide-in-from-bottom duration-1000">
<div class="glass-card rounded-xl p-8 md:p-10">
<!-- Headline & Content -->
<div class="mb-stack-lg text-center md:text-left">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Welcome</h2>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                        Sign in to access your saved medical profile and journey history.
                    </p>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-widest" for="email">
                            EMAIL ADDRESS
                        </label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline/30 rounded-lg px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all duration-300 glow-amber" id="email" placeholder="Enter your email" type="email">
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-lg h-14 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all group">
<span>Continue with email</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="hud-line"></div>
<span class="absolute px-4 bg-surface-container text-data-label font-data-label text-on-surface-variant">OR</span>
</div>
<!-- Secondary CTA -->
<button class="w-full border border-secondary text-secondary font-body-lg h-14 rounded-lg flex items-center justify-center gap-2 hover:bg-secondary/10 active:scale-[0.98] transition-all mb-8">
<span>Continue as Guest (demo)</span>
</button>
<!-- Footer / Privacy Note -->
<div class="flex items-start gap-3 p-4 bg-surface-container-high/50 rounded-lg border border-outline-variant/20">
<span class="material-symbols-outlined text-secondary text-[20px] mt-0.5" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="font-body-sm text-body-sm text-on-surface-variant/80">
                        No passwords stored on device. Medical data stays local in guest mode.
                    </p>
</div>
</div>
<!-- Context Hint (Optional atmospheric text) -->
<div class="mt-8 text-center">
<p class="font-data-label text-data-label text-on-surface-variant opacity-40 uppercase tracking-[0.2em]">
                    System Status: <span class="text-tertiary">Secure</span> • 256-bit Encryption
                </p>
</div>
</main>
</div>
<!-- Background Decoration: Light Pipe Lines -->
<div class="fixed top-0 left-0 w-full h-1 pointer-events-none bg-gradient-to-r from-transparent via-secondary/20 to-transparent"></div>
<div class="fixed bottom-0 left-0 w-full h-1 pointer-events-none bg-gradient-to-r from-transparent via-primary/10 to-transparent"></div>
<script>
        // Simple micro-interaction for the guest mode button
        document.querySelector('button.border-secondary').addEventListener('click', () => {
            console.log('Guest session initiated...');
            // Add visual feedback
            const btn = document.querySelector('button.border-secondary');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            setTimeout(() => {
                btn.innerHTML = '<span>Entering Demo...</span>';
            }, 800);
        });
    </script>
