<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NovaDrive - Journey Departure</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Geist:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#0c1321",
                        "on-surface": "#e5e2e1",
                        "tertiary-container": "#ef6719",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed-variant": "#7200a3",
                        "on-error": "#690005",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#adc6ff",
                        "surface-container-highest": "#353534",
                        "error-container": "#93000a",
                        "primary-container": "#4b8eff",
                        "secondary-fixed-dim": "#e9b3ff",
                        "on-secondary-container": "#e5a9ff",
                        "error": "#ffb4ab",
                        "surface-dim": "#131313",
                        "secondary": "#e9b3ff",
                        "inverse-surface": "#e5e2e1",
                        "surface-bright": "#393939",
                        "inverse-on-surface": "#313030",
                        "surface-variant": "#353534",
                        "on-secondary-fixed": "#310048",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-fixed": "#351000",
                        "surface-container": "#201f1f",
                        "on-secondary": "#510074",
                        "tertiary-fixed-dim": "#ffb595",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "on-tertiary": "#571e00",
                        "on-primary": "#002e69",
                        "secondary-container": "#7d01b1",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c1c6d7",
                        "secondary-fixed": "#f6d9ff",
                        "on-background": "#e5e2e1",
                        "tertiary": "#ffb595",
                        "on-primary-fixed": "#001a41",
                        "on-tertiary-container": "#4c1a00",
                        "surface-tint": "#adc6ff",
                        "outline-variant": "#414755",
                        "inverse-primary": "#005bc1",
                        "tertiary-fixed": "#ffdbcc",
                        "surface": "#131313",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-container": "#00285c",
                        "outline": "#8b90a0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "touch-target-min": "48px",
                        "floating-offset": "24px",
                        "margin-mobile": "20px",
                        "margin-desktop": "40px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "display-metrics": ["Sora"],
                        "body-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-lg-mobile": ["Sora"],
                        "headline-md": ["Sora"],
                        "headline-lg": ["Sora"],
                        "label-mono": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-metrics": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "label-mono": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .hud-bg {
            background-color: #0c1321;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .light-streak {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(173,198,255,0.4), transparent);
            transform: rotate(45deg);
            filter: blur(1px);
            animation: streakMove 3s linear infinite;
        }
        @keyframes streakMove {
            0% { transform: translate(-100px, -100px) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(500px, 500px) rotate(45deg); opacity: 0; }
        }
        .progress-bar-fill {
            width: 0%;
            animation: fillProgress 2s ease-in-out forwards;
        }
        @keyframes fillProgress {
            to { width: 100%; }
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative font-body-md">
<!-- HUD Background with grid and streaks -->
<div class="absolute inset-0 hud-bg">
<div class="light-streak top-[10%] left-[20%]" style="animation-delay: 0s;"></div>
<div class="light-streak top-[40%] left-[60%]" style="animation-delay: 1s;"></div>
<div class="light-streak top-[70%] left-[30%]" style="animation-delay: 2s;"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background/40 via-transparent to-background"></div>
</div>
<!-- Header -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-touch-target-min bg-background/60 backdrop-blur-md">
<button aria-label="Cancel Journey" class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center w-[48px] h-[48px]" onclick="console.log('Cancel Journey')">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-headline-lg-mobile text-[20px] tracking-widest text-primary font-bold uppercase">NOVA DRIVE</h1>
<div class="w-[48px]"></div>
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex flex-col items-center justify-center h-full px-gutter">
<!-- Central Visualization Area -->
<div class="relative w-full max-w-md h-48 mb-12 flex items-center justify-center">
<!-- Subtle HUD Target/Reticle -->
<div class="absolute w-32 h-32 border border-primary/20 rounded-full animate-pulse"></div>
<div class="absolute w-48 h-48 border border-primary/10 rounded-full border-dashed animate-spin-slow"></div>
<div class="w-3 h-3 bg-primary rounded-full shadow-[0_0_15px_rgba(173,198,255,1)]"></div>
</div>
<!-- Initialization Modal (Card) -->
<div class="bg-[#1a2235]/90 backdrop-blur-2xl rounded-xl p-8 w-full max-w-sm border border-white/5 shadow-2xl flex flex-col items-center text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-1 font-semibold">Starting journey...</h2>
<p class="font-label-mono text-[12px] text-on-surface-variant mb-8 uppercase tracking-[0.2em] font-medium">INITIALIZING TELEMETRY</p>
<!-- Progress Container -->
<div class="w-full">
<!-- Thin Elegant Progress Bar -->
<div class="w-full h-[2px] bg-white/5 rounded-full overflow-hidden relative">
<div class="progress-bar-fill h-full bg-primary absolute left-0 top-0 rounded-full shadow-[0_0_8px_rgba(173,198,255,0.8)]"></div>
</div>
<!-- Status Labels -->
<div class="w-full flex justify-between mt-4 font-label-mono text-[10px] text-outline tracking-wider font-bold">
<span>SYS.CHECK</span>
<span>HUD.READY</span>
</div>
</div>
</div>
</main>
<script>
        // Simulation for transition
        setTimeout(() => {
            console.log('Transition Complete. Proceeding to Journey HUD.');
        }, 2200);
    </script>
<style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 20s linear infinite;
        }
    </style>
</body></html>
