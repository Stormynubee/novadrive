<style>
        .speed-lines {
            background-image: 
                linear-gradient(to bottom, rgba(173, 198, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to right, rgba(173, 198, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 40px, 40px 100%;
            animation: moveLines 10s linear infinite;
        }
        
        @keyframes moveLines {
            from { background-position: 0 0; }
            to { background-position: 0 400px; }
        }

        .amber-glow {
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md selection:bg-primary selection:text-on-primary">
<!-- Ambient Background Texture -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40 speed-lines"></div>
<div class="absolute inset-0 z-0 pointer-events-none bg-gradient-to-b from-surface-container-lowest/80 via-surface/90 to-surface-container-lowest/95 backdrop-blur-sm"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col h-full min-h-screen justify-between py-12">
<!-- Top Spacer -->
<div class="flex-grow flex items-center justify-center">
<!-- Branding Pod -->
<div class="flex flex-col items-start w-full max-w-sm space-y-8">
<!-- Logo -->
<div class="relative group">
<div class="absolute -inset-4 bg-primary/10 rounded-full blur-2xl group-hover:bg-primary/20 transition duration-1000"></div>
<img alt="NovaDrive Brand Logo" class="relative w-32 h-32 rounded-lg object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0ugEskWybTOo__mVKR40WpoS7jaCJZ9RAlk2nqTaoQyb2ohgjwbw2oYJwGL2mlCHPtwUPSDZ-a3Fv1lMqFmakFEdWlVuKC1U9lroq72TJBM76FRr0IEIV25Pj9otNtHxWrqxjQnsH3oHM6cn6QLncnBhjxi4L_3IyIsnNhOYaJpGgXtTdVxq-1kUr_D2kXj6cNK4awQUe1mPf2wVPbNi43wuPFfI4rAvQLIlbasi3ljyGKkffmUg8BgwvLE">
</div>
<!-- Typography Cluster -->
<div class="space-y-4">
<h1 class="font-display-metrics text-display-metrics text-transparent bg-clip-text bg-gradient-to-r from-[#FBBF24] to-[#FCD34D] drop-shadow-sm">
                        NovaDrive
                    </h1>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                        Signal drops. The critical minute doesn't.
                    </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm border-l-2 border-outline-variant pl-4 py-1">
                        Offline triage · trauma routing · QR relay
                    </p>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full max-w-sm mx-auto pb-safe mt-8">
<button class="w-full h-touch-target-min bg-[#FBBF24] text-surface-container-lowest rounded-md font-headline-md text-headline-md hover:bg-[#FCD34D] active:scale-[0.98] transition-all duration-200 amber-glow flex items-center justify-center group focus:outline-none focus:ring-2 focus:ring-[#FBBF24] focus:ring-offset-2 focus:ring-offset-surface">
<span>Get started</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<script>
        // Optional: Simple ambient entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                main.style.transition = 'opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
