<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Journey HUD - Departure</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

                        "on-secondary-fixed-variant": "#7200a3",

                        "primary-fixed": "#d8e2ff",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#adc6ff",
                        "surface-container-highest": "#353534",
                        "error-container": "#93000a",
                        "primary-container": "#4b8eff",
                        "secondary-fixed-dim": "#e9b3ff",
                        "on-secondary-container": "#e5a9ff",
                        "error": "#ffb4ab",
                        "surface-dim": "#131313",
                        "secondary": "#e9b3ff",
                        "inverse-surface": "#e5e2e1",
                        "surface-bright": "#393939",
                        "inverse-on-surface": "#313030",
                        "surface-variant": "#353534",
                        "on-secondary-fixed": "#310048",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-fixed": "#351000",
                        "background": "#131313",
                        "surface-container": "#201f1f",
                        "on-secondary": "#510074",
                        "tertiary-fixed-dim": "#ffb595",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "on-tertiary": "#571e00",
                        "on-primary": "#002e69",
                        "secondary-container": "#7d01b1",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c1c6d7",
                        "secondary-fixed": "#f6d9ff",
                        "on-background": "#e5e2e1",
                        "tertiary": "#ffb595",
                        "on-primary-fixed": "#001a41",
                        "on-tertiary-container": "#4c1a00",
                        "surface-tint": "#adc6ff",
                        "outline-variant": "#414755",
                        "inverse-primary": "#005bc1",
                        "tertiary-fixed": "#ffdbcc",
                        "surface": "#131313",
                        "surface-container-high": "#2a2a2a",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "unit": "8px",
                        "touch-target-min": "48px",
                        "floating-offset": "24px",

                    },
                    "fontFamily": {
                        "display-metrics": ["Sora"],
                        "body-md": ["Geist"],

                    },
                    "fontSize": {

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                }
            }
        }
    </script>
<style>
    body {
        min-height: max(884px, 100dvh);
        -webkit-user-select: none;
        user-select: none;
    }

    /* HUD Grid Background */
    .hud-grid {
        background-image: 
            linear-gradient(to right, rgba(173, 198, 255, 0.05) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(173, 198, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        perspective: 1000px;
        transform: rotateX(60deg) translateY(-20%);
        transform-origin: top;
    }

    /* Scanning Light Streaks Animation */
    .light-streaks {
        background: radial-gradient(circle at center, transparent 0%, rgba(13, 13, 13, 1) 70%),
                    repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(173, 198, 255, 0.03) 101px, rgba(173, 198, 255, 0.03) 102px);
    }

    .streak {
        position: absolute;
        width: 2px;
        height: 100px;
        background: linear-gradient(to bottom, transparent, #adc6ff, transparent);
        opacity: 0;
        animation: streak-fall linear infinite;
    }

    @keyframes streak-fall {
        0% { transform: translateY(-200px) rotate(45deg); opacity: 0; }
        20% { opacity: 0.4; }
        80% { opacity: 0.4; }
        100% { transform: translateY(120vh) rotate(45deg); opacity: 0; }
    }

    .scanning-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(173, 198, 255, 0.2), transparent);
        top: 0;
        animation: scan 4s ease-in-out infinite;
    }

    @keyframes scan {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { top: 100%; opacity: 0; }
    }
</style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative font-body-md">
<!-- Background Elements -->
<div class="absolute inset-0 z-0 bg-background">
<!-- Subtle Grid -->
<div class="absolute inset-0 hud-grid opacity-20"></div>
<!-- Animation Layer -->
<div class="absolute inset-0 light-streaks">
<!-- Randomized Streaks -->
<div class="streak" style="left: 10%; animation-duration: 3s; animation-delay: 0.5s;"></div>
<div class="streak" style="left: 30%; animation-duration: 2.5s; animation-delay: 1.2s;"></div>
<div class="streak" style="left: 60%; animation-duration: 3.5s; animation-delay: 0s;"></div>
<div class="streak" style="left: 85%; animation-duration: 2s; animation-delay: 0.8s;"></div>
<div class="streak" style="left: 45%; animation-duration: 4s; animation-delay: 2s;"></div>
</div>
<!-- Scan Line -->
<div class="scanning-line"></div>
</div>
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-touch-target-min bg-surface/90 backdrop-blur-2xl border-b border-white/5">
<button aria-label="Cancel Journey" class="text-on-surface-variant hover:text-on-surface active:scale-95 transition-all flex items-center justify-center w-[48px] h-[48px]" onclick="console.log('Cancel Journey')">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary brightness-110">NOVA DRIVE</h1>
<div class="w-[48px]"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex flex-col items-center justify-center h-full pt-20 px-gutter w-full">
<!-- Central HUD: Speed Indicator -->
<div class="flex flex-col items-center animate-pulse-subtle">
<div class="relative">
<!-- Circular Glow Backdrop -->
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full scale-150"></div>
<div class="font-display-metrics text-[120px] leading-[120px] font-bold text-primary drop-shadow-[0_0_20px_rgba(173,198,255,0.6)] tracking-tighter relative z-10">0</div>
</div>
<div class="font-label-mono text-label-mono text-primary/70 uppercase tracking-[0.3em] mt-4">km / h</div>
<!-- Telemetry Status Overlay (Subtle) -->
<div class="mt-24 flex flex-col items-center gap-2 opacity-60">
<div class="flex items-center gap-3">
<span class="w-1 h-1 rounded-full bg-primary animate-ping"></span>
<span class="font-label-mono text-[10px] uppercase tracking-widest">System Calibrating</span>
</div>
<div class="w-32 h-[1px] bg-white/10 relative overflow-hidden">
<div class="absolute inset-0 bg-primary/50 w-1/3 animate-[loading_2s_infinite]"></div>
</div>
</div>
</div>
<!-- Static Controls at Bottom -->
<div class="absolute bottom-12 w-full px-margin-mobile flex flex-col items-center gap-8">
<!-- Hold for SOS Button (Original Functionality Maintained) -->
<button class="w-[100px] h-[100px] rounded-full bg-error/90 text-on-error shadow-[0_0_40px_rgba(255,180,171,0.15)] border border-error/20 flex flex-col items-center justify-center relative overflow-hidden active:scale-95 transition-transform duration-300 outline-none select-none" id="sos-btn">
<div class="absolute bottom-0 left-0 w-full bg-error-container h-0 transition-all duration-100 ease-linear" id="sos-progress"></div>
<span class="material-symbols-outlined text-4xl relative z-10 mb-1" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-mono text-[10px] relative z-10 font-bold uppercase tracking-widest">Hold SOS</span>
</button>
<!-- Simulate Crash Button (Original Functionality Maintained) -->
<button class="px-6 py-2.5 rounded-full border border-outline-variant/30 text-outline/80 hover:bg-surface-variant/30 hover:text-on-surface-variant transition-colors font-label-mono text-[10px] uppercase tracking-widest backdrop-blur-sm" id="simulate-crash-btn">
        Simulate Crash
    </button>
</div>
</main>
<!-- Crash Dialog Overlay (Preserved from Source) -->
<div class="fixed inset-0 z-[100] bg-surface-dim/95 backdrop-blur-xl hidden flex-col items-center justify-center p-6 opacity-0 transition-opacity duration-300" id="crash-dialog">
<div class="bg-surface-container-highest rounded-[2rem] p-8 w-full max-w-sm flex flex-col items-center text-center shadow-2xl border border-white/10 relative overflow-hidden">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-tertiary/20 rounded-full blur-[40px] pointer-events-none"></div>
<div class="w-16 h-16 rounded-full bg-tertiary/10 border border-tertiary/20 flex items-center justify-center mb-6 relative z-10">
<span class="material-symbols-outlined text-tertiary text-3xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Possible impact detected.</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-8 relative z-10">Are you okay?</p>
<div class="w-full h-1.5 bg-surface-container-lowest rounded-full overflow-hidden mb-8 relative z-10">
<div class="h-full bg-tertiary w-full origin-left" id="crash-progress"></div>
</div>
<div class="w-full flex flex-col gap-3 relative z-10">
<button class="w-full py-4 rounded-xl bg-error text-on-error font-headline-lg-mobile text-[18px] font-semibold active:scale-[0.98] transition-transform" id="btn-need-help">
                Need Help
            </button>
<button class="w-full py-4 rounded-xl bg-surface-container-low border border-outline-variant/30 text-on-surface font-headline-lg-mobile text-[18px] font-semibold active:scale-[0.98] transition-transform" id="btn-im-okay">
                I am okay
            </button>
</div>
</div>
</div>
<style>
    @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
    }
    .animate-pulse-subtle {
        animation: pulse-subtle 4s ease-in-out infinite;
    }
    @keyframes pulse-subtle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.85; }
    }
</style>
<script>
    // Crash Simulation Logic
    const dialog = document.getElementById('crash-dialog');
    const progressBar = document.getElementById('crash-progress');
    const btnCrash = document.getElementById('simulate-crash-btn');
    const btnOkay = document.getElementById('btn-im-okay');
    const btnHelp = document.getElementById('btn-need-help');

    btnCrash.addEventListener('click', () => {
        dialog.classList.remove('hidden');
        void dialog.offsetWidth;
        dialog.classList.remove('opacity-0');
        progressBar.style.transition = 'none';
        progressBar.style.transform = 'scaleX(1)';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                progressBar.style.transition = 'transform 15s linear';
                progressBar.style.transform = 'scaleX(0)';
            });
        });
    });

    function closeDialog() {
        dialog.classList.add('opacity-0');
        setTimeout(() => {
            dialog.classList.add('hidden');
            progressBar.style.transition = 'none';
        }, 300);
    }

    btnOkay.addEventListener('click', () => {
        closeDialog();
    });

    btnHelp.addEventListener('click', () => {
        closeDialog();
    });

    // SOS Button Logic
    const sosBtn = document.getElementById('sos-btn');
    const sosProgress = document.getElementById('sos-progress');
    let sosTimer;
    let isHolding = false;

    function startSOS(e) {
        if(e.cancelable) e.preventDefault();
        isHolding = true;
        sosProgress.style.transition = 'height 1.5s linear';
        sosProgress.style.height = '100%';
        sosTimer = setTimeout(() => {
            if(isHolding) {
                console.log('SOS Triggered!');
                sosProgress.style.transition = 'none';
                sosProgress.style.height = '0%';
                isHolding = false;
            }
        }, 1500);
    }

    function cancelSOS(e) {
        if(e.cancelable) e.preventDefault();
        if(!isHolding) return;
        isHolding = false;
        clearTimeout(sosTimer);
        sosProgress.style.transition = 'height 0.2s ease-out';
        sosProgress.style.height = '0%';
    }

    sosBtn.addEventListener('mousedown', startSOS);
    sosBtn.addEventListener('touchstart', startSOS, {passive: false});
    window.addEventListener('mouseup', cancelSOS);
    sosBtn.addEventListener('mouseleave', cancelSOS);
    window.addEventListener('touchend', cancelSOS, {passive: false});
</script>
</body></html>
