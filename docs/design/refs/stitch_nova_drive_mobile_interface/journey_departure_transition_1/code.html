<!DOCTYPE html><html class="dark" lang="en"><head>

<style>.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBeN93L9Kpm9rJ_3OwlOiAEgWyjv6TMr0SjHDgjc2A_tvNe3zelGu7aS5VTz6I5jUNme4V2E_DAjzbprMqkMlXJ7Vra51EOQL4sAiAdjEclpxgARzaoEBjA9cd_7WLA7AkXrwGp1yGAsOpDD4RC4XugorKuHI67nTcu7uTC6uAFOuPEzi7Def9sXg1qhNY-VkhdC7zIEe6aftTBzRvA2o_gTczDciUW90nUElDmGlHedLQRFn-Nm_dbfyh4qtY2jeHoG0vkZQqG4bs);
    background-size: cover;
    background-position: center
    }
.animated-line {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawLine 1.5s ease-in-out forwards
    }
.progress-bar-fill {
    width: 0%;
    animation: fillProgress 1.5s ease-in-out forwards
    }
@keyframes drawLine {
    to {
        stroke-dashoffset: 0;
        }
    }
@keyframes fillProgress {
    to {
        width: 100%;
        }
    }
/* Pulse effect for the end destination dot */
.pulse-dot {
    animation: pulse 1s infinite alternate;
    opacity: 0;
    animation-delay: 1.2s;
    /* Start pulsing near the end of the line draw */
    animation-fill-mode: forwards
    }
@keyframes pulse {
    from {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(173, 198, 255, 0.7);
        } to {
        transform: scale(1.2);
        box-shadow: 0 0 10px 5px rgba(173, 198, 255, 0);
        }
    }</style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative font-body-md">
<!-- Stylized Highway Map Background with dark overlay for HUD feel -->
<div class="absolute inset-0 map-bg opacity-30" data-alt="A stylized, high-tech nighttime highway map view from above. The scene is bathed in deep dark navy and indigo tones, representing a modern glassmorphism cockpit HUD aesthetic. Glowing, intricate road networks snake through the dark terrain, creating a high-performance, precision data visualization feel. Minimalist and visionary, emphasizing speed and connectivity in the dark.">
</div>
<!-- Gradient Overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-transparent"></div>
<!-- Top AppBar (Simplified for transition screen) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-touch-target-min bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-none">
<button aria-label="Cancel Journey" class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center w-[48px] h-[48px]" onclick="console.log('Cancel Journey')">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary">NOVA DRIVE</h1>
<div class="w-[48px]"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex flex-col items-center justify-center h-full px-gutter">
<!-- Animated SVG Route Map -->
<div class="relative w-full max-w-md h-64 mb-8">
<svg class="w-full h-full" fill="none" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
<!-- Background subtle grid -->
<path d="M0 50 H300 M0 100 H300 M0 150 H300 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200" stroke="currentColor" stroke-opacity="0.05" stroke-width="1"></path>
<!-- The Route Line -->
<path class="animated-line drop-shadow-[0_0_8px_rgba(173,198,255,0.6)]" d="M30 170 C 80 160, 100 100, 150 90 C 200 80, 240 110, 270 50" stroke="#adc6ff" stroke-linecap="round" stroke-width="4"></path>
<!-- Start Point Dot -->
<circle cx="30" cy="170" fill="#adc6ff" r="6"></circle>
<circle cx="30" cy="170" fill="#131313" r="3"></circle>
<!-- End Point Dot (Pulses when reached) -->
<circle class="pulse-dot" cx="270" cy="50" fill="#adc6ff" r="6"></circle>
</svg>
</div>
<!-- Glassmorphism Status Pod -->
<div class="bg-surface-container-highest/80 backdrop-blur-2xl rounded-xl p-6 w-full max-w-sm border border-white/10 shadow-2xl flex flex-col items-center text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Starting journey...</h2>
<p class="font-label-mono text-label-mono text-on-surface-variant mb-6 uppercase tracking-widest">Initializing Telemetry</p>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-lowest rounded-full overflow-hidden relative">
<div class="progress-bar-fill h-full bg-gradient-to-r from-primary to-secondary absolute left-0 top-0 rounded-full shadow-[0_0_10px_rgba(173,198,255,0.8)]"></div>
</div>
<div class="w-full flex justify-between mt-3 font-label-mono text-[10px] text-outline">
<span>SYS.CHECK</span>
<span>HUD.READY</span>
</div>
</div>
</main>
<script>
        // Simulate navigation after the 1.5s transition completes
        setTimeout(() => {
            console.log('Transition Complete. Proceeding to Journey HUD.');
            // window.location.href = '/journey-hud'; 
        }, 1800); // Slight buffer after animation ends
    </script>
</body></html>
