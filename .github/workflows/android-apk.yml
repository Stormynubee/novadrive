name: Android debug APK

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      MARGI_JUDGE_APK: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: novadrive-mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: novadrive-mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        working-directory: novadrive-mobile
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Assemble debug APK
        working-directory: novadrive-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK for judges
        run: cp novadrive-mobile/android/app/build/outputs/apk/debug/app-debug.apk margi-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: margi-debug-apk
          path: margi-debug.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: margi-debug.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
